<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LockIn</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>

<section class="popup-section">

  <!-- ── HEADER (always visible) ── -->
  <div class="header-compact-container">
    <div class="header-text-streak">
      <div class="header-subheader-container">
        <span class="header-compact-text">LockIn</span>
        <span class="subheader-compact-text">Stay Locked in and productive</span>
      </div>
      <div class="header-right">
        <span class="streak-header" id="streak-header">
          <img src="icons/fire.png" class="streak-icon">
          <span class="streak-count" id="streak-count">0</span>
        </span>
        <div class="compact-container" id="compact-container">
          <button class="compact-btn" id="compact-btn" title="Toggle compact view">
            <img src="icons/up.png" class="compact_icon" id="compact-icon-img">
          </button>
        </div>
      </div>
    </div>
    <div class="progress-bar-wrapper">
      <div class="progress-container">
        <div class="progress-bar" id="header-progress-bar"></div>
      </div>
      <div class="bar-percent-container">
        <span class="progress-text">Session Progress</span>
        <span class="progress-percent" id="header-progress-percent">0%</span>
      </div>
    </div>
  </div>

  <!-- ── BODY (hidden when compact) ── -->
  <div class="body-wrapper" id="body-wrapper">
    <div class="body-container" id="main-view">

      <!-- Mascot -->
      <div class="mascot-container">
        <img src="icons/mascot3.png" class="mascot-icon">
        <span class="dynamic-motivation-text" id="motivation-text">
          Strive to be 1% better today than you were yesterday.
        </span>
      </div>

      <!-- Current / Goal times -->
      <div class="today-goal-wrapper">
        <div class="today-container">
          <span class="today-text">CURRENT</span>
          <span class="today-time" id="current-time">
            <span>0h</span><span>0m</span>
          </span>
        </div>
        <div class="goal-container">
          <span class="goal-text">GOAL</span>
          <span class="goal-time" id="goal-time">
            <span>0h</span><span>0m</span>
          </span>
        </div>
      </div>

      <!-- Session output countdown -->
      <div class="session-output" id="session-output"></div>

      <!-- Quick session buttons -->
      <span class="session-header-text">QUICK SESSION</span>
      <div class="quick-sessions-container" id="quick-sessions-container">
        <button class="fifteenMin-btn">
          <span class="session-header">15m</span>
          <span class="session-subheader">quick</span>
        </button>
        <button class="thirtyMin-btn">
          <span class="session-header">30m</span>
          <span class="session-subheader">default</span>
        </button>
        <button class="fortyfiveMin-btn">
          <span class="session-header">45m</span>
          <span class="session-subheader">deep</span>
        </button>
        <button class="sixtyMin-btn">
          <span class="session-header">60m</span>
          <span class="session-subheader">flow</span>
        </button>
      </div>

      <!-- Start / Break / Stop buttons -->
      <div class="start-session-container" id="start-session-container">
        <button class="start-btn" id="start-btn">
          <img src="icons/play2.png" class="start-icon">
          Start Session
        </button>
      </div>

      <!-- View Details -->
      <div class="view-session-container">
        <button class="view-btn" id="view-details-btn">
          <img src="icons/down.png" class="view-icon">
          View Details
        </button>
      </div>

    </div><!-- /#main-view -->
  </div><!-- /#body-wrapper -->

</section>

<!-- ── CONFIRMATION OVERLAY ── -->
<div class="confirmation-overlay" id="confirmation-overlay" style="display:none;">
  <div class="confirmation-dialog">
    <span class="confirmation-text" id="confirmation-text"></span>
    <div class="confirmation-buttons">
      <button class="confirmation-btn yes-btn" id="confirm-yes">Yes</button>
      <button class="confirmation-btn no-btn" id="confirm-no">No</button>
    </div>
  </div>
</div>

<!-- ── START NEW SESSION OVERLAY (expanded view only) ── -->
<div class="session-overlay" id="session-overlay" style="display:none;">
  <div class="session-overlay-dialog">
    <div class="session-overlay-header">
      <span class="session-overlay-title">New Session</span>
      <button class="modal-close" id="session-overlay-close">✕</button>
    </div>
    <div class="session-overlay-body">
      <label class="modal-label">Session Duration (minutes)</label>
      <div class="sched-dur-btns" id="new-session-dur-btns">
        <button class="sched-dur-btn active" data-dur="15">15m</button>
        <button class="sched-dur-btn" data-dur="30">30m</button>
        <button class="sched-dur-btn" data-dur="45">45m</button>
        <button class="sched-dur-btn" data-dur="60">60m</button>
        <button class="sched-dur-btn" data-dur="90">90m</button>
        <button class="sched-dur-btn" data-dur="120">2h</button>
      </div>
      <label class="modal-label" style="margin-top:10px;">Break every</label>
      <div class="sched-dur-btns" id="new-session-break-freq-btns">
        <button class="sched-dur-btn active" data-freq="0">None</button>
        <button class="sched-dur-btn" data-freq="15">15m</button>
        <button class="sched-dur-btn" data-freq="25">25m</button>
        <button class="sched-dur-btn" data-freq="30">30m</button>
        <button class="sched-dur-btn" data-freq="45">45m</button>
      </div>
      <label class="modal-label" style="margin-top:10px;">Break duration</label>
      <div class="sched-dur-btns" id="new-session-break-dur-btns">
        <button class="sched-dur-btn active" data-brkdur="5">5m</button>
        <button class="sched-dur-btn" data-brkdur="10">10m</button>
        <button class="sched-dur-btn" data-brkdur="15">15m</button>
      </div>
    </div>
    <div class="session-overlay-footer">
      <button class="overlay-stop-btn" id="session-overlay-stop">Stop</button>
      <button class="overlay-start-btn" id="session-overlay-start">Start</button>
    </div>
  </div>
</div>

<!-- ── SCHEDULE MODAL ── -->
<div class="modal-overlay" id="schedule-modal" style="display:none;">
  <div class="modal-dialog">
    <div class="modal-header">
      <span class="modal-title">Schedule a Session</span>
      <button class="modal-close" id="schedule-modal-close">✕</button>
    </div>
    <div class="modal-body" id="schedule-modal-body">
      <!-- Step 1: Date -->
      <div id="sched-step-1">
        <label class="modal-label">Pick a date:</label>
        <input type="date" id="sched-date-input" class="modal-input">
        <button class="modal-btn" id="sched-date-confirm">Next →</button>
      </div>
      <!-- Step 2: Start / End time -->
      <div id="sched-step-2" style="display:none;">
        <label class="modal-label">Start time:</label>
        <input type="time" id="sched-start-time" class="modal-input">
        <label class="modal-label" style="margin-top:8px;">End time:</label>
        <input type="time" id="sched-end-time" class="modal-input">
        <button class="modal-btn" id="sched-time-confirm">Next →</button>
      </div>
      <!-- Step 3: Break settings -->
      <div id="sched-step-3" style="display:none;">
        <label class="modal-label">Break frequency:</label>
        <div class="sched-dur-btns" id="sched-break-freq-btns">
          <button class="sched-dur-btn active" data-freq="0">None</button>
          <button class="sched-dur-btn" data-freq="15">15m</button>
          <button class="sched-dur-btn" data-freq="25">25m</button>
          <button class="sched-dur-btn" data-freq="30">30m</button>
          <button class="sched-dur-btn" data-freq="45">45m</button>
        </div>
        <label class="modal-label" style="margin-top:8px;">Break duration:</label>
        <div class="sched-dur-btns" id="sched-break-dur-btns">
          <button class="sched-dur-btn active" data-brkdur="5">5m</button>
          <button class="sched-dur-btn" data-brkdur="10">10m</button>
          <button class="sched-dur-btn" data-brkdur="15">15m</button>
        </div>
        <button class="modal-btn" id="sched-confirm-btn">Confirm Session</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
